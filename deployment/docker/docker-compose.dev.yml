services:
  stateset-agents-api-dev:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile
      target: dev
    ports:
      - "8000:8000"
    environment:
      API_ENVIRONMENT: development
      API_REQUIRE_AUTH: "false"
      API_LOG_LEVEL: DEBUG
      INFERENCE_BACKEND: ${INFERENCE_BACKEND:-stub}
      INFERENCE_BACKEND_URL: ${INFERENCE_BACKEND_URL:-http://localhost:8001}
      INFERENCE_DEFAULT_MODEL: ${INFERENCE_DEFAULT_MODEL:-moonshotai/Kimi-K2.5}
    volumes:
      - ../../:/app
      - /app/__pycache__
    networks:
      - dev-network

  stateset-agents-test:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile
      target: test
    environment:
      API_REQUIRE_AUTH: "false"
      INFERENCE_BACKEND: stub
      INFERENCE_DEFAULT_MODEL: moonshotai/Kimi-K2.5
    networks:
      - dev-network
    profiles:
      - test

networks:
  dev-network:
    driver: bridge
