services:
  # FastAPI gateway (Anthropic/OpenAI compatible)
  stateset-agents-api:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    environment:
      API_ENVIRONMENT: ${API_ENVIRONMENT:-development}
      API_REQUIRE_AUTH: ${API_REQUIRE_AUTH:-false}
      API_LOG_LEVEL: ${API_LOG_LEVEL:-INFO}

      # Default to stub so `docker compose up` works without a model backend.
      INFERENCE_BACKEND: ${INFERENCE_BACKEND:-stub}
      INFERENCE_BACKEND_URL: ${INFERENCE_BACKEND_URL:-http://localhost:8001}
      INFERENCE_DEFAULT_MODEL: ${INFERENCE_DEFAULT_MODEL:-moonshotai/Kimi-K2.5}

      # Optional (not enabled by default in the gateway image).
      CACHE_BACKEND: ${CACHE_BACKEND:-memory}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DB_BACKEND: ${DB_BACKEND:-memory}
      DATABASE_URL: ${DATABASE_URL:-postgresql://stateset:${POSTGRES_PASSWORD:-change_me_dev}@postgres:5432/stateset_agents}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - redis
      - postgres
    networks:
      - stateset-network

  # Development gateway (hot reload)
  stateset-agents-api-dev:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile
      target: dev
    ports:
      - "8002:8000"
    environment:
      API_ENVIRONMENT: development
      API_REQUIRE_AUTH: "false"
      API_LOG_LEVEL: DEBUG
      INFERENCE_BACKEND: ${INFERENCE_BACKEND:-stub}
      INFERENCE_BACKEND_URL: ${INFERENCE_BACKEND_URL:-http://localhost:8001}
      INFERENCE_DEFAULT_MODEL: ${INFERENCE_DEFAULT_MODEL:-moonshotai/Kimi-K2.5}
    volumes:
      - ../../:/app
      - /app/__pycache__
    networks:
      - stateset-network
    profiles:
      - dev

  # Run the Python test suite in a container
  stateset-agents-test:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile
      target: test
    environment:
      API_REQUIRE_AUTH: "false"
      INFERENCE_BACKEND: stub
      INFERENCE_DEFAULT_MODEL: moonshotai/Kimi-K2.5
    networks:
      - stateset-network
    profiles:
      - test

  # Optional deps (only used when enabled via env vars)
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    networks:
      - stateset-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: stateset_agents
      POSTGRES_USER: stateset
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_dev}
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - stateset-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - stateset-network
    profiles:
      - monitoring

networks:
  stateset-network:
    driver: bridge
