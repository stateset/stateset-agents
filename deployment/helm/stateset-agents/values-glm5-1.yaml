api:
  env:
    INFERENCE_DEFAULT_MODEL: "zai-org/GLM-5.1"

vllm:
  modelId: "zai-org/GLM-5.1"
  finetuned: false
  modelPath: "/models/glm5-1/merged"
  args:
  - "--tensor-parallel-size=8"
  - "--pipeline-parallel-size=2"
  - "--max-model-len=131072"
  - "--reasoning-parser=glm45"
  - "--enable-auto-tool-choice"
  - "--tool-call-parser=glm45"
  - "--gpu-memory-utilization=0.92"
  - "--enable-chunked-prefill"
  - "--enable-prefix-caching"
  - "--trust-remote-code"
  - "--host=0.0.0.0"
  - "--port=8000"

trainingJob:
  outputDir: "/models/glm5-1"
  command:
  - "bash"
  - "-lc"
  - "python examples/finetune_glm5_1_gspo.py --task customer_service --no-dry-run --output-dir /models/glm5-1"
