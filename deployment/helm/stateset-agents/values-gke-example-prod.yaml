global:
  namespace: stateset-agents

serviceAccount:
  # Reuse the existing KSA that is annotated for Workload Identity.
  create: false
  name: "workload-identity-ksa"

api:
  image:
    repository: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/stateset-agents-api
    tag: "0.11.2-7"
  env:
    API_ENVIRONMENT: "production"
    API_REQUIRE_AUTH: "true"
    # Keep the gateway stable while vLLM is downloading/initializing. Flip to "vllm"
    # once the vLLM Deployment is healthy.
    INFERENCE_BACKEND: "stub"
    INFERENCE_DEFAULT_MODEL: "moonshotai/Kimi-K2.5"
    INFERENCE_DEFAULT_MAX_TOKENS: "1024"
    INFERENCE_HEALTH_PATH: "/health"
    INFERENCE_STREAM_INCLUDE_USAGE: "true"

vllm:
  # GPU capacity is not guaranteed without a reservation; keep vLLM off in the
  # baseline prod values and enable it with a dedicated override when capacity
  # is confirmed.
  enabled: false
  modelId: "moonshotai/Kimi-K2.5"
  hfSecretName: "hf-secret"
  hfSecretKey: "hf_token"
  args:
  - "--tensor-parallel-size=8"
  - "--mm-encoder-tp-mode=data"
  - "--tool-call-parser=kimi_k2"
  - "--reasoning-parser=kimi_k2"
  - "--max-model-len=256000"
  - "--gpu-memory-utilization=0.90"
  - "--enable-chunked-prefill"
  - "--enable-prefix-caching"
  - "--trust-remote-code"
  - "--host=0.0.0.0"
  - "--port=8000"
  resources:
    requests:
      cpu: "10"
      memory: "600Gi"
      # Kimi-K2.5 weights are large; keep generous headroom for downloads/cache.
      "ephemeral-storage": "500Gi"
      "nvidia.com/gpu": "8"
    limits:
      cpu: "10"
      memory: "600Gi"
      "ephemeral-storage": "500Gi"
      "nvidia.com/gpu": "8"
  gpu:
    accelerator: "nvidia-tesla-a100"
    count: 8

 # Prefer GCS model registry sync over PVCs on Autopilot. PVCs can still be used,
 # but enabling them in Helm requires the PVC to be Helm-managed.
pvc:
  enabled: true
  create: false
  name: "stateset-models-pvc"

ingress:
  enabled: true
  className: "nginx"
  host: "api.example.com"
  tls:
    enabled: true
    secretName: "example-com-tls"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
