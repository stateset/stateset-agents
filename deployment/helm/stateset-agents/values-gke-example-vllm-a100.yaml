# Enable vLLM (A100) and point the API gateway at it.
#
# Note: On Autopilot, large GPU shapes can require capacity reservations to be
# reliably scheduled. If scheduling fails with "GCE out of resources", create a
# reservation and set the nodeSelectorExtra keys shown below.

api:
  env:
    INFERENCE_BACKEND: "vllm"
    INFERENCE_BACKEND_URL: "http://stateset-agents-vllm:8000"
    INFERENCE_DEFAULT_MODEL: "moonshotai/Kimi-K2.5"
    INFERENCE_STREAM_INCLUDE_USAGE: "true"

vllm:
  enabled: true
  modelId: "moonshotai/Kimi-K2.5"
  hfSecretName: "hf-secret"
  hfSecretKey: "hf_token"
  gpu:
    accelerator: "nvidia-tesla-a100"
    count: 8
  resources:
    requests:
      cpu: "10"
      memory: "600Gi"
      "ephemeral-storage": "500Gi"
      "nvidia.com/gpu": "8"
    limits:
      cpu: "10"
      memory: "600Gi"
      "ephemeral-storage": "500Gi"
      "nvidia.com/gpu": "8"
  args:
  - "--tensor-parallel-size=8"
  - "--mm-encoder-tp-mode=data"
  - "--tool-call-parser=kimi_k2"
  - "--reasoning-parser=kimi_k2"
  - "--max-model-len=256000"
  - "--gpu-memory-utilization=0.90"
  - "--enable-chunked-prefill"
  - "--enable-prefix-caching"
  - "--trust-remote-code"
  - "--host=0.0.0.0"
  - "--port=8000"
  nodeSelectorExtra: {}

# Example (reservation-backed scheduling):
# vllm:
#   nodeSelectorExtra:
#     cloud.google.com/reservation-name: "projects/RESERVATION_PROJECT_ID/reservations/RESERVATION_NAME"
#     cloud.google.com/reservation-affinity: "specific"
