{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "stateset-agents.fullname" . }}-api
  namespace: {{ .Values.global.namespace }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    app: {{ include "stateset-agents.fullname" . }}-api
  ports:
  - port: {{ .Values.api.service.port }}
    targetPort: {{ .Values.api.service.port }}
    protocol: TCP
    name: http
{{- end }}
