global:
  namespace: stateset-agents

serviceAccount:
  create: false
  name: "workload-identity-ksa"

api:
  image:
    repository: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/stateset-agents-api
    tag: "0.11.2-7"
  env:
    API_ENVIRONMENT: "staging"
    API_REQUIRE_AUTH: "true"
    INFERENCE_BACKEND: "stub"

vllm:
  enabled: false

pvc:
  enabled: false

trainingJob:
  enabled: false
  image:
    repository: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/stateset-agents-trainer
    tag: "0.11.2-7"
