api:
  env:
    API_REQUIRE_AUTH: "true"
    INFERENCE_DEFAULT_MODEL: "zai-org/GLM-5.1"
    INFERENCE_MODEL_MAP: '{"zai-org/GLM-5.1":"your-org/GLM-5.1-FP8"}'

vllm:
  modelId: "your-org/GLM-5.1-FP8"
  finetuned: false
  gpu:
    count: 8
    accelerator: "nvidia-h200"
  resources:
    requests:
      cpu: "32"
      memory: "1500Gi"
      ephemeral-storage: "1500Gi"
      "nvidia.com/gpu": "8"
    limits:
      cpu: "32"
      memory: "1500Gi"
      ephemeral-storage: "1500Gi"
      "nvidia.com/gpu": "8"
  args:
  - "--tensor-parallel-size=8"
  - "--max-model-len=131072"
  - "--reasoning-parser=glm45"
  - "--enable-auto-tool-choice"
  - "--tool-call-parser=glm45"
  - "--gpu-memory-utilization=0.92"
  - "--quantization=fp8"
  - "--enable-chunked-prefill"
  - "--enable-prefix-caching"
  - "--trust-remote-code"
  - "--host=0.0.0.0"
  - "--port=8000"

pvc:
  size: "1500Gi"
