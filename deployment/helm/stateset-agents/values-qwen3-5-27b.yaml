api:
  env:
    INFERENCE_DEFAULT_MODEL: "Qwen/Qwen3.5-27B"

vllm:
  modelId: "Qwen/Qwen3.5-27B"
  finetuned: false
  modelPath: "/models/qwen3-5-27b/merged"
  args:
  - "--tensor-parallel-size=8"
  - "--max-model-len=262144"
  - "--reasoning-parser=qwen3"
  - "--enable-auto-tool-choice"
  - "--tool-call-parser=qwen3_coder"
  - "--language-model-only"
  - "--gpu-memory-utilization=0.90"
  - "--enable-chunked-prefill"
  - "--enable-prefix-caching"
  - "--trust-remote-code"
  - "--host=0.0.0.0"
  - "--port=8000"

trainingJob:
  outputDir: "/models/qwen3-5-27b"
  command:
  - "bash"
  - "-lc"
  - "python examples/finetune_qwen3_5_27b_gspo.py --task customer_service --output-dir /models/qwen3-5-27b"
