---
apiVersion: v1
kind: Namespace
metadata:
  name: stateset-agents
  labels:
    name: stateset-agents
    environment: production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stateset-agents-config
  namespace: stateset-agents
data:
  # Agent Configuration
  MODEL_NAME: "gpt2"
  MAX_NEW_TOKENS: "512"
  TEMPERATURE: "0.8"
  TOP_P: "0.9"
  USE_STUB_MODEL: "false"

  # Training Configuration
  NUM_EPISODES: "1000"
  LEARNING_RATE: "5e-6"
  BATCH_SIZE: "4"

  # API Configuration
  API_ENVIRONMENT: "production"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_REQUIRE_AUTH: "true"
  API_RATE_LIMIT_ENABLED: "true"
  WORKERS: "4"

  # Inference Backend Configuration
  INFERENCE_BACKEND: "vllm"
  INFERENCE_BACKEND_URL: "http://kimi-k25-vllm-finetuned.stateset-agents.svc.cluster.local:8000"
  INFERENCE_DEFAULT_MODEL: "moonshotai/Kimi-K2.5"
  # vLLM serves the fine-tuned model using a local path model ID; map the public
  # model name to that internal identifier.
  INFERENCE_MODEL_MAP: '{"moonshotai/Kimi-K2.5":"/models/kimi-k25/merged"}'
  INFERENCE_DEFAULT_MAX_TOKENS: "1024"
  INFERENCE_HEALTH_PATH: "/health"
  INFERENCE_STREAM_INCLUDE_USAGE: "true"

  # Observability
  API_LOG_LEVEL: "INFO"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stateset-agents-api
  namespace: stateset-agents
  labels:
    app: stateset-agents-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: stateset-agents-api
  template:
    metadata:
      labels:
        app: stateset-agents-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: tmp
        emptyDir: {}
      containers:
      - name: stateset-agents
        image: stateset/stateset-agents-api:0.7.1
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: stateset-agents-config
        - secretRef:
            name: stateset-agents-secrets
        resources:
          requests:
            cpu: "2"
            memory: "8Gi"
          limits:
            cpu: "4"
            memory: "16Gi"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        startupProbe:
          httpGet:
            path: /healthz
            port: 8000
          periodSeconds: 5
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: stateset-agents-api
  namespace: stateset-agents
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    name: http
  selector:
    app: stateset-agents-api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stateset-agents-api-hpa
  namespace: stateset-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stateset-agents-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
