apiVersion: v1
kind: Secret
metadata:
  name: stateset-agents-secrets
  namespace: stateset-agents
type: Opaque
stringData:
  # Required in production. Generate with:
  # python -c "import secrets; print(secrets.token_urlsafe(64))"
  API_JWT_SECRET: "<REPLACE_ME>"

  # Optional API keys (format: key1:role1|role2,key2:role3)
  API_KEYS: ""

  # Optional integrations
  WANDB_API_KEY: ""
  # Used by training jobs / vLLM model downloads (not required by the gateway itself).
  HUGGING_FACE_HUB_TOKEN: ""

  # Optional storage/backends
  REDIS_URL: ""
  DATABASE_URL: ""
