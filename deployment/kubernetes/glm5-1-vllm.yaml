apiVersion: apps/v1
kind: Deployment
metadata:
  name: glm5-1-vllm
  namespace: stateset-agents
  labels:
    app: glm5-1-vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glm5-1-vllm
  template:
    metadata:
      labels:
        app: glm5-1-vllm
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: vllm
        image: vllm/vllm-openai:nightly
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: MODEL_ID
          value: zai-org/GLM-5.1
        - name: HF_HOME
          value: /models/hf
        - name: TRANSFORMERS_CACHE
          value: /models/hf
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: hf_token
        command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
        args:
        - --model=$(MODEL_ID)
        - --tensor-parallel-size=8
        - --pipeline-parallel-size=2
        - --max-model-len=131072
        - --reasoning-parser=glm45
        - --enable-auto-tool-choice
        - --tool-call-parser=glm45
        - --gpu-memory-utilization=0.92
        - --enable-chunked-prefill
        - --enable-prefix-caching
        - --trust-remote-code
        - --host=0.0.0.0
        - --port=8000
        resources:
          requests:
            cpu: "32"
            memory: "1500Gi"
            ephemeral-storage: "2000Gi"
            nvidia.com/gpu: "8"
          limits:
            cpu: "32"
            memory: "1500Gi"
            ephemeral-storage: "2000Gi"
            nvidia.com/gpu: "8"
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: models
          mountPath: /models
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 360
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 5
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      - name: models
        persistentVolumeClaim:
          claimName: stateset-models-pvc
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-h200

---
apiVersion: v1
kind: Service
metadata:
  name: glm5-1-vllm
  namespace: stateset-agents
spec:
  selector:
    app: glm5-1-vllm
  type: ClusterIP
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000

---
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: glm5-1-vllm-monitoring
  namespace: stateset-agents
spec:
  selector:
    matchLabels:
      app: glm5-1-vllm
  endpoints:
  - port: 8000
    path: /metrics
    interval: 30s
