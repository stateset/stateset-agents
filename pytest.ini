[pytest]
testpaths = tests
addopts =
    -ra
    --strict-markers
    --strict-config
    -m "not performance and not slow and not gpu"
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may need external resources)
    performance: Performance tests
    api: API endpoint tests
    e2e: End-to-end tests
    slow: Slow running tests
    gpu: Tests requiring GPU
    async: Asynchronous tests
    security: Security-related tests
asyncio_mode = auto
filterwarnings =
    ignore:Importing from 'api' is deprecated\.:DeprecationWarning
    ignore:Support for class-based `config` is deprecated, use ConfigDict instead\.:pydantic.warnings.PydanticDeprecatedSince20
    ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning
    ignore:The 'repr' attribute with value False was provided to the `Field\(\)` function.*:UserWarning
    ignore:The 'frozen' attribute with value True was provided to the `Field\(\)` function.*:UserWarning
    ignore:.*clean_up_tokenization_spaces.*:FutureWarning
