name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Publish environment (workflow_dispatch only)'
        required: true
        default: 'testpypi'
        options:
          - testpypi
          - pypi

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.event_name == 'release' && 'pypi' || github.event.inputs.environment }}
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-publish-${{ hashFiles('**/pyproject.toml') }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,api]"
        pip install bandit safety
        pip install build twine

    - name: Run publish readiness checks
      run: |
        make publish-readiness

    - name: Show publish readiness summary
      if: always()
      run: |
        if [ -f publish-readiness-summary.json ]; then
          cat publish-readiness-summary.json
        else
          echo "publish-readiness-summary.json not generated"
        fi

    - name: Ensure publish readiness artifacts exist for upload
      if: always()
      run: |
        touch bandit-report.json
        touch safety-report.json
        touch coverage.xml
        touch publish-readiness-summary.json

    - name: Upload publish readiness artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: publish-readiness-reports
        path: |
          bandit-report.json
          safety-report.json
          coverage.xml
          publish-readiness-summary.json
    
    - name: Verify Version Matches Release Tag
      if: github.event_name == 'release'
      run: |
        TAG="${{ github.event.release.tag_name }}"
        TAG="${TAG#v}"
        PKG_VERSION="$(python - <<'PY'\nimport sys\n\ntry:\n    import tomllib\nexcept ModuleNotFoundError:  # pragma: no cover\n    import tomli as tomllib\n\nwith open('pyproject.toml', 'rb') as f:\n    data = tomllib.load(f)\nversion = data.get('project', {}).get('version')\nif not version:\n    print('missing_version')\n    sys.exit(2)\nprint(version)\nPY\n)"
        if [ "${PKG_VERSION}" != "${TAG}" ]; then
          echo "Version mismatch: tag=${TAG} pyproject=${PKG_VERSION}"
          exit 1
        fi
    
    - name: Publish to TestPyPI
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'testpypi'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      run: |
        python -m twine upload --skip-existing --repository testpypi dist/*
    
    - name: Publish to PyPI
      if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'pypi')
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        python -m twine upload --skip-existing dist/*

  docker-publish:
    runs-on: ubuntu-latest
    needs: publish
    if: github.event.inputs.environment == 'pypi' || github.event_name == 'release'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Extract metadata
      id: meta_api
      uses: docker/metadata-action@v5
      with:
        images: stateset/stateset-agents-api
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push gateway image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./deployment/docker/Dockerfile
        target: runtime
        push: true
        tags: ${{ steps.meta_api.outputs.tags }}
        labels: ${{ steps.meta_api.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Extract metadata (trainer)
      id: meta_trainer
      uses: docker/metadata-action@v5
      with:
        images: stateset/stateset-agents-trainer
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push trainer image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./deployment/docker/Dockerfile.trainer
        push: true
        tags: ${{ steps.meta_trainer.outputs.tags }}
        labels: ${{ steps.meta_trainer.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  docs-publish:
    runs-on: ubuntu-latest
    needs: publish
    if: github.event.inputs.environment == 'pypi' || github.event_name == 'release'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install sphinx sphinx-rtd-theme
    
    - name: Build documentation
      run: |
        sphinx-build docs docs/_build/html
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: docs/_build/html
        cname: docs.stateset.ai
