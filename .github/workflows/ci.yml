name: CI

permissions:
  contents: read

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  publish-readiness:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,api]"
        pip install bandit safety build twine

    - name: Run publish readiness checks
      run: |
        make publish-readiness

    - name: Show publish readiness summary
      if: always()
      run: |
        if [ -f publish-readiness-summary.json ]; then
          cat publish-readiness-summary.json
        else
          echo "publish-readiness-summary.json not generated"
        fi

    - name: Ensure publish-readiness artifacts exist for upload
      if: always()
      run: |
        touch bandit-report.json
        touch safety-report.json
        touch coverage.xml
        touch publish-readiness-summary.json

    - name: Upload publish readiness artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: publish-readiness-reports
        path: |
          bandit-report.json
          safety-report.json
          coverage.xml
          publish-readiness-summary.json

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,api]"

    - name: Run linting
      run: |
        ruff check .
        black --check .
        isort --check-only .

    - name: Run pre-commit checks
      run: |
        pre-commit run --all-files

    - name: Run type checking
      run: |
        mypy --config-file mypy.ini

    - name: Run tests
      run: |
        pytest --cov=stateset_agents --cov-report=xml --cov-fail-under=70

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,api]"

    - name: Run tests
      run: |
        pytest -x --tb=short

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run strict security scan
      run: |
        make security-scan-strict

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,api]"

    - name: Build documentation
      run: |
        pip install sphinx sphinx-rtd-theme
        sphinx-build docs docs/_build/html

    - name: Upload documentation
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/_build/html/

  helm:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.19.5

    - name: Helm lint
      run: |
        helm lint deployment/helm/stateset-agents

    - name: Helm template (default)
      run: |
        helm template stateset-agents deployment/helm/stateset-agents \
          --namespace stateset-agents \
          > /tmp/stateset-agents-rendered.yaml
        test -s /tmp/stateset-agents-rendered.yaml

    - name: Helm template (GPU profiles)
      run: |
        helm template stateset-agents deployment/helm/stateset-agents \
          -f deployment/helm/stateset-agents/values-a100.yaml \
          --namespace stateset-agents \
          > /tmp/stateset-agents-rendered-a100.yaml
        helm template stateset-agents deployment/helm/stateset-agents \
          -f deployment/helm/stateset-agents/values-kimi-k25-finetuned.yaml \
          --namespace stateset-agents \
          > /tmp/stateset-agents-rendered-finetuned.yaml
        helm template stateset-agents deployment/helm/stateset-agents \
          -f deployment/helm/stateset-agents/values-h100.yaml \
          --namespace stateset-agents \
          > /tmp/stateset-agents-rendered-h100.yaml
        helm template stateset-agents deployment/helm/stateset-agents \
          -f deployment/helm/stateset-agents/values-b200.yaml \
          --namespace stateset-agents \
          > /tmp/stateset-agents-rendered-b200.yaml
