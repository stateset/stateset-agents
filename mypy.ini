[mypy]
python_version = 3.10
warn_return_any = true
warn_unused_configs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
show_error_codes = true
ignore_missing_imports = true
follow_imports = skip

# CI currently gates a small, stable typed surface area.
# The rest of the repo is incrementally being typed and is intentionally not
# part of the blocking typecheck yet.
files = stateset_agents/api/main.py, stateset_agents/api/auth.py, stateset_agents/api/cache.py, stateset_agents/api/dependencies.py, stateset_agents/api/logging_config.py, stateset_agents/api/messages_models.py, stateset_agents/api/messages_utils.py, stateset_agents/api/openai_models.py, stateset_agents/api/services/inference_service.py, stateset_agents/api/services/training_service.py, stateset_agents/api/routers/messages.py, stateset_agents/api/routers/openai.py, stateset_agents/api/grpo/config.py, stateset_agents/api/grpo/state.py
